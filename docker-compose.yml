# superfreak-backend – run API + MongoDB + Redis on your VPS (Proxmox)
# Usage: copy .env.example to .env, fill in secrets, then:
#   docker compose up -d
#
# API uses the Mongo from the payload stack (superfreak_app-network, service "mongo")
# so staging and mongo-express see the same data. Requires payload stack to be up first.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: superfreak-backend:latest
    container_name: superfreak-api
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 4000
      # Use Mongo from payload stack (same DB as mongo-express)
      DATABASE_URL: mongodb://mongo:27017/superfreak
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - default
      - app-network

  mongodb:
    image: mongo:7
    container_name: superfreak-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: superfreak
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: superfreak-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:

networks:
  app-network:
    external: true
    name: superfreak_app-network
